name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-core
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create redirect page
        run: |
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0;url=ai_marker.user.js">
          <title>AI 批改助手 - 安装脚本</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
            .card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 480px; }
            h1 { margin: 0 0 12px; font-size: 24px; }
            p { color: #666; margin: 8px 0; line-height: 1.6; }
            a { display: inline-block; margin-top: 16px; padding: 12px 32px; background: #3451b2; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; }
            a:hover { background: #2a3f96; }
            .tip { font-size: 13px; color: #999; margin-top: 16px; }
          </style>
          </head>
          <body>
          <div class="card">
            <h1>AI 批改助手</h1>
            <p>正在跳转到安装脚本...</p>
            <p>如果没有自动跳转，请点击下方按钮：</p>
            <a href="ai_marker.user.js">安装脚本</a>
            <p class="tip">需要先安装 Tampermonkey 浏览器扩展（仅支持电脑端 Edge 浏览器）</p>
          </div>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Upload script for server deploy
        uses: actions/upload-artifact@v4
        with:
          name: script-dist
          path: dist/ai_marker.user.js
          retention-days: 1

  # 部署到 GitHub Pages（保留）
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # 部署到云服务器
  deploy-server:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download script
        uses: actions/download-artifact@v4
        with:
          name: script-dist
          path: dist

      - name: Remove old script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: sudo rm -f /opt/1panel/apps/openresty/openresty/www/sites/auto-update.aimarking.five-plus-one.com/index/ota/ai_marker.user.js

      - name: Deploy script to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/ai_marker.user.js"
          target: /opt/1panel/apps/openresty/openresty/www/sites/auto-update.aimarking.five-plus-one.com/index/ota/
          strip_components: 1
          overwrite: true

      - name: Set permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            sudo chown www:www /opt/1panel/apps/openresty/openresty/www/sites/auto-update.aimarking.five-plus-one.com/index/ota/ai_marker.user.js
            sudo chmod 644 /opt/1panel/apps/openresty/openresty/www/sites/auto-update.aimarking.five-plus-one.com/index/ota/ai_marker.user.js
